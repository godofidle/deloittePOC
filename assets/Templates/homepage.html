<div class=row>
    <div class="col-12 col-lg-3 col-md-4 col-sm-6">
        <p class="d-none d-sm-block tag-grey-text">FILTER BY</p>
        <div class=clearfix>
            <img src=/deloittePOC/filterIcon.38423ebb.png width=20 height=20 alt class="d-block d-sm-none float-right margin-bottom10" id=filterIconID>
        </div>
        <div id=filterBlock class="d-none d-sm-block">
            <div class="btn-group custom-dropdown">
                <button type=button class="btn btn-secondary">Collection</button>
                <button type=button class="btn btn-secondary dropdown-toggle dropdown-toggle-split" id=dropdownMenuCollectionButton data-toggle=dropdown aria-haspopup=true aria-expanded=false data-reference=parent>
                    <span class=sr-only>Collection Dropdown</span>
                </button>
                <div class=dropdown-menu aria-labelledby=dropdownMenuCollectionButton>
                  <a class=dropdown-item>Collection</a>
                </div>
            </div>
            <div class="btn-group custom-dropdown">
                <button type=button class="btn btn-secondary">Color</button>
                <button type=button class="btn btn-secondary dropdown-toggle dropdown-toggle-split" id=dropdownMenuColorButton data-toggle=dropdown aria-haspopup=true aria-expanded=false data-reference=parent>
                    <span class=sr-only>Color Dropdown</span>
                </button>
                <div class=dropdown-menu aria-labelledby=dropdownMenuColorButton>
                  <a class=dropdown-item>Red</a>
                </div>
            </div>
            <div class="btn-group custom-dropdown">
                <button type=button class="btn btn-secondary">Category</button>
                <button type=button class="btn btn-secondary dropdown-toggle dropdown-toggle-split" id=dropdownMenuCategoryButton data-toggle=dropdown aria-haspopup=true aria-expanded=false data-reference=parent>
                    <span class=sr-only>Category Dropdown</span>
                </button>

                <div class=dropdown-menu aria-labelledby=dropdownMenuCategoryButton>
                  <a class=dropdown-item>Category</a>
                </div>
            </div>

            
        </div>
    </div>
    <div class="col-12 col-lg-9 col-md-8 col-sm-6">
        <div id=allProducts class=row></div>
        <p id=serviceCallHomeMessage></p>
    </div>
</div>
